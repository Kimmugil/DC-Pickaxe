name: DC-Pickaxe 갭 탐지 + 백필 봇

on:
  schedule:
    # 매일 03:00 KST (18:00 UTC) — 전날 생긴 갭을 다음날 새벽에 복구
    - cron: '0 18 * * *'
  workflow_dispatch:  # 수동 실행 (Actions 탭에서 버튼으로 즉시 실행 가능)

jobs:
  gap-fill:
    runs-on: ubuntu-latest
    timeout-minutes: 65   # MAX_RUNTIME_MIN(50) + 여유 15분

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Gap Filler
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          MASTER_SHEET_URL: ${{ secrets.MASTER_SHEET_URL }}
        run: python gap_filler.py
