name: DC Gallery Scraper Bot

on:
  schedule:
    # 1시간마다 실행 (매 시 정각, GitHub Actions 특성상 수 분 지연될 수 있음)
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      gallery_ids:
        description: '스크래핑할 갤러리 ID (공백 구분). 비워두면 전체 실행.'
        required: false
        default: ''

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper
      env:
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        MASTER_SHEET_URL: ${{ secrets.MASTER_SHEET_URL }}
        GALLERY_IDS: ${{ github.event.inputs.gallery_ids }}
      run: python scraper.py
