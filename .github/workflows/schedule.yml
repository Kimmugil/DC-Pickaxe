name: DC Gallery Scraper Bot

on:
  schedule:
    # 1시간마다 실행 (매 시 정각, GitHub Actions 특성상 수 분 지연될 수 있음)
    - cron: '0 * * * *'
  workflow_dispatch: # 수동으로도 버튼을 눌러서 실행할 수 있게 해줌

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper
      # 여기서 GitHub Secrets에 저장해둔 구글 출입증을 파이썬 코드로 안전하게 넘겨줘!
      env:
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        MASTER_SHEET_URL: ${{ secrets.MASTER_SHEET_URL }} # 이거 한 줄 추가!
      run: python scraper.py
