name: DC-Pickaxe stats 탭 초기 설정

on:
  workflow_dispatch:  # 수동 실행 전용 (Actions 탭에서 버튼으로 실행)
    inputs:
      gallery_ids:
        description: '특정 갤러리만 실행할 경우 ID 입력 (공백 구분). 비워두면 전체 실행.'
        required: false
        default: ''

jobs:
  setup-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run setup_stats_sheet
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          MASTER_SHEET_URL: ${{ secrets.MASTER_SHEET_URL }}
        run: |
          if [ -n "${{ github.event.inputs.gallery_ids }}" ]; then
            python setup_stats_sheet.py ${{ github.event.inputs.gallery_ids }}
          else
            python setup_stats_sheet.py
          fi
