name: DC-Pickaxe ID 갭 채우기

on:
  workflow_dispatch:
    inputs:
      gallery_id:
        description: '갤러리 ID (예: projectnike, azurpromilia)'
        required: true

jobs:
  fill-id-gaps:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ID Gap Filler
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          MASTER_SHEET_URL: ${{ secrets.MASTER_SHEET_URL }}
          GALLERY_ID: ${{ github.event.inputs.gallery_id }}
        run: python id_gap_filler.py
